# PROPOSAL - NOT YET APPLIED to the live unit. Awaiting sign-off.
#
# Raises the systemd stop deadline so the worker's clean shutdown has room to
# drain the in-request content_kv writes and flush the small iii-KV scopes
# before systemd escalates to SIGKILL. Repeated SIGKILL-on-stop (the base unit's
# TimeoutStopSec=20s being exceeded by LanceDB worker threads) is what truncated
# the iii-KV flush and lost RAM-only content for weeks.
#
# With the content-persistence write-through fix, content is durable in
# content_kv on every write, so this timeout is margin for hygiene only - it is
# no longer load-bearing for data safety. The worker enforces its OWN deadline
# (AGENTMEMORY_SHUTDOWN_DEADLINE_MS, default 30s) and exits nonzero past it, so a
# hung stop surfaces in the journal instead of being silently SIGKILLed.
#
# Install (after approval):
#   sudo cp deploy/agentmemory-timeoutstop.conf \
#       /etc/systemd/system/agentmemory.service.d/zz-timeoutstop.conf
#   sudo systemctl daemon-reload
# Revert:
#   sudo rm /etc/systemd/system/agentmemory.service.d/zz-timeoutstop.conf
#   sudo systemctl daemon-reload
[Service]
TimeoutStopSec=180
